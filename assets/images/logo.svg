<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Logo QR Personal System: mitad código QR, mitad silueta de persona con traje">
  <!-- Fondo -->
  <rect width="200" height="200" rx="36" fill="#EFEBFB"/>

  <!-- ===== Mitad izquierda: patrón tipo QR ===== -->
  <g fill="#52439E">
    <!-- Marcador esquina superior izquierda -->
    <rect x="14" y="14" width="28" height="28"/>
    <rect x="20" y="20" width="16" height="16" fill="#EFEBFB"/>
    <rect x="25" y="25" width="6" height="6" fill="#52439E"/>

    <!-- Marcador esquina inferior izquierda -->
    <rect x="14" y="158" width="28" height="28"/>
    <rect x="20" y="164" width="16" height="16" fill="#EFEBFB"/>
    <rect x="25" y="169" width="6" height="6" fill="#52439E"/>

    <!-- Módulos de relleno (patrón decorativo, no escaneable) -->
    <rect x="52" y="14" width="10" height="10"/>
    <rect x="70" y="14" width="10" height="10"/>
    <rect x="52" y="32" width="10" height="10"/>
    <rect x="14" y="52" width="10" height="10"/>
    <rect x="32" y="52" width="10" height="10"/>
    <rect x="70" y="52" width="10" height="10"/>
    <rect x="52" y="70" width="10" height="10"/>
    <rect x="70" y="70" width="10" height="10"/>
    <rect x="14" y="88" width="10" height="10"/>
    <rect x="32" y="88" width="10" height="10"/>
    <rect x="70" y="88" width="10" height="10"/>
    <rect x="52" y="106" width="10" height="10"/>
    <rect x="14" y="124" width="10" height="10"/>
    <rect x="70" y="124" width="10" height="10"/>
    <rect x="52" y="140" width="10" height="10"/>
    <rect x="70" y="158" width="10" height="10"/>
    <rect x="52" y="176" width="10" height="10"/>
    <rect x="32" y="106" width="10" height="10"/>
    <rect x="14" y="106" width="10" height="10"/>
  </g>

  <!-- Línea divisoria sutil -->
  <rect x="98" y="10" width="4" height="180" rx="2" fill="#DAD6F2"/>

  <!-- ===== Mitad derecha: silueta de persona con traje y corbata ===== -->
  <g>
    <!-- Cabeza -->
    <circle cx="150" cy="62" r="26" fill="#52439E"/>
    <!-- Cuerpo / traje (hombros y torso) -->
    <path d="M112 190
             C112 148 126 128 150 128
             C174 128 188 148 188 190
             Z" fill="#52439E"/>
    <!-- Solapas del saco -->
    <path d="M150 128 L136 168 L150 158 Z" fill="#EFEBFB"/>
    <path d="M150 128 L164 168 L150 158 Z" fill="#EFEBFB"/>
    <!-- Corbata -->
    <path d="M150 132 L156 148 L150 190 L144 148 Z" fill="#B36829"/>
  </g>
</svg>
