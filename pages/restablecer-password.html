<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña | QR Personal System</title>
<link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="container">
  <nav class="navbar">
    <a class="navbar__logo" href="../index.html"><img src="../assets/images/logo.svg" alt="" width="32" height="32"> QR Personal System</a>
  </nav>
</header>

<main class="container" style="max-width: 440px; padding-top: var(--space-xl);">
  <div class="card">
    <h1 style="font-size:1.5rem;">Crea tu nueva contraseña</h1>
    <p class="form-hint">Este link es de un solo uso y expira por seguridad. Si ya expiró, solicita uno nuevo.</p>

    <form id="form-restablecer" novalidate>
      <div class="form-group">
        <label class="form-label" for="password">Nueva contraseña</label>
        <input class="form-input" type="password" id="password" name="password" required minlength="8" placeholder="Mínimo 8 caracteres">
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">Confirma tu nueva contraseña</label>
        <input class="form-input" type="password" id="password2" name="password2" required minlength="8">
      </div>

      <div id="restablecer-error" class="form-error" role="alert" style="display:none;"></div>
      <div id="restablecer-exito" class="form-success" role="status" style="display:none;"></div>

      <button type="submit" class="btn btn-primary btn-block" id="btn-restablecer">Guardar nueva contraseña</button>
    </form>

    <p style="margin-top: var(--space-md); text-align:center; font-size: 0.9rem;">
      <a href="olvide-password.html">Pedir un nuevo link</a>
    </p>
  </div>
</main>

<script type="module" src="../assets/js/restablecer-password.js"></script>
</body>
</html>
