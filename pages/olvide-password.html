<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña | QR Personal System</title>
<link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="container">
  <nav class="navbar">
    <a class="navbar__logo" href="../index.html"><img src="../assets/images/logo.svg" alt="" width="32" height="32"> QR Personal System</a>
  </nav>
</header>

<main class="container" style="max-width: 440px; padding-top: var(--space-xl);">
  <div class="card">
    <h1 style="font-size:1.5rem;">¿Olvidaste tu contraseña?</h1>
    <p class="form-hint">Ingresa tu correo y te enviaremos un link para crear una nueva contraseña.</p>

    <form id="form-olvide" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input class="form-input" type="email" id="email" name="email" required>
      </div>

      <div id="olvide-error" class="form-error" role="alert" style="display:none;"></div>
      <div id="olvide-exito" class="form-success" role="status" style="display:none;"></div>

      <button type="submit" class="btn btn-primary btn-block" id="btn-olvide">Enviar link de recuperación</button>
    </form>

    <p style="margin-top: var(--space-md); text-align:center; font-size: 0.9rem;">
      <a href="login.html">Volver a iniciar sesión</a>
    </p>
  </div>
</main>

<script type="module" src="../assets/js/olvide-password.js"></script>
</body>
</html>
